let currentSort = 'days_listed';
let sortAsc = true;

function identityTag(id) {
  const map = {
    '屋主': 'tag-owner', '房仲': 'tag-broker',
    '代理人': 'tag-agent',
  };
  return '<span class="tag ' + (map[id] || 'tag-unknown') + '">' + (id || '未標示') + '</span>';
}

function daysTag(d) {
  if (d <= 3) return '<span class="tag tag-new">' + d + '天</span>';
  if (d >= 14) return '<span class="tag tag-old">' + d + '天</span>';
  return d + '天';
}

function getFiltered() {
  let items = [...DATA];
  const region = document.getElementById('fRegion').value;
  const identity = document.getElementById('fIdentity').value;
  const search = document.getElementById('fSearch').value.toLowerCase();

  const district = document.getElementById('fDistrict').value;
  const status = document.getElementById('fStatus').value;

  if (region) items = items.filter(r => r.region === region);
  if (district) items = items.filter(r => r.district === district);
  if (identity) items = items.filter(r => r.identity === identity);
  if (status === 'active') items = items.filter(r => r.is_active !== false);
  if (status === 'delisted') items = items.filter(r => r.is_active === false);
  if (search) items = items.filter(r =>
    (r.title + r.district + r.building_type + r.rooms).toLowerCase().includes(search)
  );

  const sort = document.getElementById('fSort').value;
  if (sort === 'price_asc') items.sort((a,b) => a.price_num - b.price_num);
  else if (sort === 'price_desc') items.sort((a,b) => b.price_num - a.price_num);
  else if (sort === 'area_desc') items.sort((a,b) => b.area_num - a.area_num);
  else if (sort === 'diff_asc') items.sort((a,b) => (a.price_diff_pct||999) - (b.price_diff_pct||999));
  else items.sort((a,b) => a.days_listed - b.days_listed);

  return items;
}

function renderTable() {
  const items = getFiltered();
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');

  if (!items.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = items.map((r, i) => {
    const rowClass = r.is_active === false ? 'row-delisted' : '';
    const statusTag = r.is_active === false
      ? '<span class="tag tag-delisted">已下架</span>'
      : '<span class="tag tag-active">上架中</span>';
    const d591 = r.days_on_591 || r.days_listed || 0;
    const dTrack = r.days_tracked || 0;
    return `
    <tr class="${rowClass}">
      <td>${i+1}</td>
      <td>${r.title}</td>
      <td class="price">${r.price || '-'}</td>
      <td>${r.area || '-'}</td>
      <td>${r.building_type || '-'} ${r.rooms || ''}</td>
      <td>${r.region} ${r.district}</td>
      <td>${d591}天${r.post_date ? '<br><small>'+r.post_date+'</small>' : ''}</td>
      <td>${dTrack}天${r.first_seen ? '<br><small>'+r.first_seen+'起</small>' : ''}</td>
      <td>${r.bathrooms || '-'}</td>
      <td>${identityTag(r.identity)}</td>
      <td>${statusTag}</td>
      <td class="${(r.price_diff_pct||0) <= 0 ? 'below' : 'above'}">${r.price_vs_market || '-'}${r.market_median ? '<br><small>行情 $'+r.market_median.toLocaleString()+'</small>' : ''}</td>
      <td>${r.recommend === '強烈建議去談' ? '<span class="tag tag-hot">🔥 強烈建議</span>' : r.recommend === '建議去談' ? '<span class="tag tag-warm">👍 建議去談</span>' : r.recommend === '可考慮' ? '<span class="tag tag-maybe">可考慮</span>' : '-'}</td>
      <td><a href="${r.url}" target="_blank" class="link">查看</a></td>
    </tr>`;
  }).join('');

  // 更新統計
  const ownerCount = items.filter(r => r.identity === '屋主').length;
  const avgPrice = items.length ? Math.round(items.reduce((s,r) => s+r.price_num, 0) / items.length) : 0;
  const newCount = items.filter(r => (r.days_on_591||r.days_listed||0) <= 3).length;
  const activeCount = items.filter(r => r.is_active !== false).length;
  const delistedCount = items.filter(r => r.is_active === false).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${items.length}</div><div class="label">全部物件</div></div>
    <div class="stat-card"><div class="num">${activeCount}</div><div class="label">上架中</div></div>
    <div class="stat-card"><div class="num">${delistedCount}</div><div class="label">已下架</div></div>
    <div class="stat-card"><div class="num">${ownerCount}</div><div class="label">屋主直租</div></div>
    <div class="stat-card"><div class="num">${newCount}</div><div class="label">3天內新上架</div></div>
    <div class="stat-card"><div class="num">${avgPrice.toLocaleString()}</div><div class="label">平均月租</div></div>
    <div class="stat-card"><div class="num" style="color:#dc3545">${items.filter(r=>r.recommend).length}</div><div class="label">🔥 建議去談</div></div>
  `;
}

function resetFilters() {
  document.getElementById('fRegion').value = '';
  document.getElementById('fDistrict').value = '';
  document.getElementById('fIdentity').value = '';
  document.getElementById('fStatus').value = '';
  updateDistrictOptions();
  document.getElementById('fSort').value = 'days_listed';
  document.getElementById('fSearch').value = '';
  renderTable();
}

function sortBy(key) {
  // toggle
  const sel = document.getElementById('fSort');
  if (key === 'price_num') sel.value = sel.value === 'price_asc' ? 'price_desc' : 'price_asc';
  else if (key === 'area_num') sel.value = 'area_desc';
  else if (key === 'diff') sel.value = 'diff_asc';
  else sel.value = 'days_listed';
  renderTable();
}

// 動態產生行政區下拉選項
function updateDistrictOptions() {
  const region = document.getElementById('fRegion').value;
  const districtSet = new Set();
  DATA.forEach(r => {
    if (r.district && (!region || r.region === region)) districtSet.add(r.district);
  });
  const sel = document.getElementById('fDistrict');
  const prev = sel.value;
  sel.innerHTML = '<option value="">全部</option>';
  [...districtSet].sort().forEach(d => {
    sel.innerHTML += `<option>${d}</option>`;
  });
  if (districtSet.has(prev)) sel.value = prev;
}
document.getElementById('fRegion').addEventListener('change', () => { updateDistrictOptions(); renderTable(); });
updateDistrictOptions();
renderTable();
</script>
